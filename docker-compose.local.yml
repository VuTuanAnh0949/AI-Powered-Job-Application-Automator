version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: autoapply_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    environment:
      MONGO_INITDB_DATABASE: autoapply_ai
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/autoapply_ai --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: autoapply_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (Development)
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: autoapply_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Database
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=autoapply_ai
      
      # Vector DB
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION_NAME=job_embeddings
      
      # Application
      - ENVIRONMENT=development
      - DEBUG=true
      
      # CORS
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:5173"]
    depends_on:
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app
      - ./data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend UI (Development)
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: autoapply_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  qdrant_data:
    driver: local

networks:
  default:
    name: autoapply_network
